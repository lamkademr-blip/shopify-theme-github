name: Preview CI

on:
  push:
    branches: [preview]
  pull_request:
    branches: [preview]

jobs:
  json-validate:
    name: Validate JSON (templates, config, locales)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate all theme JSON files
        run: node scripts/check-json.mjs

  theme-check:
    name: Shopify Theme Check (informational)
    runs-on: ubuntu-latest
    # Non-blocking for now: 191 pre-existing offenses inherited from main
    # (52 MatchingTranslations, 17 MissingAsset, 10 UnknownFilter, 8
    # ImgWidthAndHeight, 7 ParserBlockingScript, 5 LiquidHTMLSyntaxError,
    # 1 ValidSchema + 91 warnings) — baseline recorded 2026-07-20.
    # Phase 5 hardening: fix or explicitly ignore these, then remove
    # continue-on-error so the job becomes blocking.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: shopify/theme-check-action@v2
        with:
          theme_root: '.'

  manifest-integrity:
    name: Configurator manifest integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check configurator asset manifest
        run: node scripts/check-manifest.mjs
