name: Preview CI

on:
  push:
    branches: [preview]
  pull_request:
    branches: [preview]

jobs:
  json-validate:
    name: Validate JSON (templates, config, locales)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate all theme JSON files
        run: node scripts/check-json.mjs

  theme-check:
    name: Shopify Theme Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shopify/theme-check-action@v2
        with:
          theme_root: '.'

  manifest-integrity:
    name: Configurator manifest integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check configurator asset manifest
        run: node scripts/check-manifest.mjs
